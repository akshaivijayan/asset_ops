services:
  - type: web
    name: asset-ops-web
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: "*"
      - key: DEFAULT_ADMIN_NAME
        value: IT Admin
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@company.com
      - key: DEFAULT_ADMIN_PASSWORD
        value: Admin@123
      - key: DEFAULT_VIEWER_EMAILS
        value: ceo@company.com,hr@company.com,accounts@company.com
      - key: DEFAULT_VIEWER_PASSWORD
        value: Viewer@123
      - key: DATABASE_URL
        fromDatabase:
          name: asset-ops-db
          property: connectionString

databases:
  - name: asset-ops-db
    plan: free
