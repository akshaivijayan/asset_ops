<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assets - Asset Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">RE</div>
        <div><h2>Estate AssetOps</h2><p>Asset Management Suite</p></div>
      </div>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
      <a class="nav-link" href="employees.html">Employees</a>
      <a class="nav-link active" href="assets.html">Assets</a>
      <a class="nav-link" href="assignments.html">Assignments</a>
      <a class="nav-link" href="reports.html">Reports</a>
      <div class="side-footer"><button class="secondary full" onclick="logout()">Logout</button></div>
    </aside>
    <main class="main">
      <div class="page-head">
        <div class="page-title">
          <h1>Asset Registry</h1>
          <p>Track laptops, mobile devices, furniture and office equipment by property location.</p>
        </div>
        <button id="addAssetBtn">Add Asset</button>
      </div>

      <section class="panel">
        <img src="assets/city-banner.svg" class="preview-image" alt="Real estate building" />
        <div class="toolbar">
          <input id="search" placeholder="Search by asset ID or name" />
          <input id="category" placeholder="Category" />
          <select id="status">
            <option value="">All Status</option>
            <option>Available</option>
            <option>Assigned</option>
            <option>Under Repair</option>
            <option>Lost</option>
            <option>Retired</option>
            <option>Inactive</option>
          </select>
          <input id="assigned_employee" placeholder="Assigned Employee" />
          <button onclick="loadAssets()">Apply Filters</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Asset ID</th>
              <th>Unique ID</th>
              <th>Name</th>
              <th>Category</th>
              <th>Status</th>
              <th>Location</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="assetRows"></tbody>
        </table>
      </section>
    </main>
  </div>

  <div class="modal" id="assetModal">
    <div class="modal-content">
      <div class="panel-head"><h3 id="assetModalTitle">Add Asset</h3></div>
      <form id="assetForm" class="form-grid">
        <input name="asset_unique_id" placeholder="Asset Unique ID" required />
        <input name="asset_name" placeholder="Asset Name" required />
        <input name="category" placeholder="Category" required />
        <input name="brand" placeholder="Brand" />
        <input name="model" placeholder="Model" />
        <input name="serial_number" placeholder="Serial Number" />
        <input name="purchase_date" type="date" />
        <input name="purchase_cost" type="number" step="0.01" placeholder="Purchase Cost" />
        <input name="vendor" placeholder="Vendor" />
        <input name="warranty_expiry" type="date" />
        <input name="asset_location" placeholder="Asset Location" />
        <select name="status">
          <option>Available</option>
          <option>Assigned</option>
          <option>Under Repair</option>
          <option>Lost</option>
          <option>Retired</option>
          <option>Inactive</option>
        </select>
        <button type="submit">Save Asset</button>
        <button type="button" class="secondary" onclick="closeAssetModal()">Cancel</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/assets.js"></script>
</body>
</html>
