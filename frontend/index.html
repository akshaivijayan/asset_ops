<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asset Tracker - Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <section class="login-visual">
        <img src="assets/asset-management-banner.svg" alt="Asset management dashboard" />
        <div class="login-copy">
          <h2>Asset Management Intelligence</h2>
          <p>Track IT and office assets across teams, departments, and locations from one reliable system.</p>
        </div>
      </section>
      <section class="login-form-wrap">
        <h1>Welcome Back</h1>
        <p>Sign in to continue to the Asset Management control panel.</p>
        <form id="loginForm" class="form-grid">
          <input class="span-2" type="email" id="email" placeholder="Work Email" required />
          <input class="span-2" type="password" id="password" placeholder="Password" required />
          <button class="span-2 full" type="submit">Sign In</button>
        </form>
        <p id="loginError" style="color:#b3261e;"></p>
        <small>Demo logins: admin@company.com / Admin@123 or ceo@company.com / Viewer@123</small>
      </section>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
