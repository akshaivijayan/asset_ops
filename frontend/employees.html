<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employees - Asset Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">RE</div>
        <div><h2>Estate AssetOps</h2><p>Asset Management Suite</p></div>
      </div>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
      <a class="nav-link active" href="employees.html">Employees</a>
      <a class="nav-link" href="assets.html">Assets</a>
      <a class="nav-link" href="assignments.html">Assignments</a>
      <a class="nav-link" href="reports.html">Reports</a>
      <div class="side-footer"><button class="secondary full" onclick="logout()">Logout</button></div>
    </aside>
    <main class="main">
      <div class="page-head">
        <div class="page-title">
          <h1>Employee Directory</h1>
          <p>Manage active and inactive staff with asset ownership visibility.</p>
        </div>
        <button id="addEmployeeBtn">Add Employee</button>
      </div>

      <section class="panel">
        <img src="assets/floor-plan.svg" class="preview-image" alt="Property floor plan" />
        <div class="toolbar">
          <input id="search" placeholder="Search by name, email, employee ID" />
          <input id="designation" placeholder="Filter by designation" />
          <input id="department" placeholder="Filter by department" />
          <button onclick="loadEmployees()">Apply Filters</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Employee ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Department</th>
              <th>Designation</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="employeeRows"></tbody>
        </table>
      </section>
    </main>
  </div>

  <div class="modal" id="employeeModal">
    <div class="modal-content">
      <div class="panel-head"><h3 id="employeeModalTitle">Add Employee</h3></div>
      <form id="employeeForm" class="form-grid">
        <input name="name" placeholder="Name" required />
        <input name="email" type="email" placeholder="Email" required />
        <input name="phone" placeholder="Phone" />
        <input name="designation" placeholder="Designation" />
        <input name="department" placeholder="Department" />
        <input name="reporting_person" placeholder="Reporting Person" />
        <input name="office_location" placeholder="Office Location" />
        <input name="joining_date" type="date" />
        <select name="employment_status">
          <option>Active</option>
          <option>Inactive</option>
        </select>
        <textarea name="notes" class="span-2" placeholder="Notes"></textarea>
        <button type="submit">Save Employee</button>
        <button type="button" class="secondary" onclick="closeEmployeeModal()">Cancel</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/employees.js"></script>
</body>
</html>
